<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Câmbio e Frete Sakura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="header-logo">
            <img src="https://i.ibb.co/3sX8M8K/sylvanian-families-logo.png" alt="Sylvanian Families Logo">
        </div>

        <div class="calculator-card">
            <div class="input-group">
                <label for="valor-jpy">Valor em Yenes (JPY):</label>
                <input type="number" id="valor-jpy" placeholder="Digite o valor em yenes..." min="0.01" step="0.01">
            </div>

            <div class="input-group">
                <label for="peso-gramas">Peso em gramas:</label>
                <input type="number" id="peso-gramas" placeholder="Digite o peso em gramas..." min="1" step="1">
            </div>

            <button id="converter-btn">CONVERTER</button>

            <div id="results-area" class="results-area hidden">
                <p id="convertido-text"></p>
                <p id="final-text" class="final-price"></p>
            </div>
            
            <p id="error-message" class="error-message hidden"></p>
        </div>
        
        <div class="footer">
            <p>Calculadora Sakura &copy; 2023</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
